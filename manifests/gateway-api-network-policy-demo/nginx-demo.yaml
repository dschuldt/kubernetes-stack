---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: nginx-demo-auth
  namespace: default
spec:
  endpointSelector:
    matchLabels:
      app: nginx-demo
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
            io.kubernetes.pod.namespace: kube-prometheus-stack
      authentication:
        mode: "required"
    - fromEntities:
        - ingress
